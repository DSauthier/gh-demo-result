name: Clear Order History

on:
  workflow_dispatch:
    inputs:
      confirm_reset:
        description: '�️ This will clear all order history and shopping cart data from the demo server. Products will remain unchanged.\n\nCheck this box to confirm you want to clear the order history.'
        required: true
        type: boolean

jobs:
  clear-order-history:
    runs-on: ubuntu-latest
    steps:
      - name: Notify about order history clearing
        run: |
          echo "�️ Clearing order history and cart data from demo server..."
          echo "Products and other data will remain unchanged."
      
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
      
      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 34.227.223.21 >> ~/.ssh/known_hosts

      - name: Clear order history on server
        run: |
          ssh ec2-user@34.227.223.21 "
            cd /home/ec2-user/gh-demo &&
            echo 'Clearing order history...' &&
            sqlite3 shop-demo.db 'DELETE FROM orders;' &&
            sqlite3 shop-demo.db 'DELETE FROM cart;' &&
            echo 'Order history cleared successfully!' &&
            echo 'Remaining orders:' &&
            sqlite3 shop-demo.db 'SELECT COUNT(*) as remaining_orders FROM orders;' &&
            echo 'Remaining cart items:' &&
            sqlite3 shop-demo.db 'SELECT COUNT(*) as remaining_cart_items FROM cart;'
          "


  create-cleanup-notification:
    runs-on: ubuntu-latest
    needs: clear-order-history
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create order history cleanup notification
        run: |
          gh issue create --title "✅ Order history cleared on demo server" \
            --body "The order history and cart data have been successfully cleared from the demo server (34.227.223.21:3000). 

**What was cleared:**
- All order records
- All shopping cart items

**What remains unchanged:**
- Product catalog
- Application code
- Database structure

The demo environment is now ready for a fresh demonstration." \
            --label "maintenance,demo-reset"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
